name: CI

on:
  push:
    branches: [main, master]
    tags: [v*]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [quality, build]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: x-skill
            asset_name: x-skill-linux-x86_64.tar.gz
            binary_name: x-skill
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact: x-skill
            asset_name: x-skill-macos-x86_64.tar.gz
            binary_name: x-skill
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact: x-skill
            asset_name: x-skill-macos-aarch64.tar.gz
            binary_name: x-skill
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: x-skill.exe
            asset_name: x-skill-windows-x86_64.zip
            binary_name: x-skill.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package Unix artifact
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/${{ matrix.binary_name }}
          tar -C dist -czf ${{ matrix.asset_name }} ${{ matrix.binary_name }}
      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.asset_name }}" -Force
      - name: Generate checksum
        if: runner.os != 'Windows'
        run: shasum -a 256 ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.asset_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset_name }}" | Out-File -FilePath "${{ matrix.asset_name }}.sha256" -Encoding ascii
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
